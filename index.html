
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>컨포멀 증착 덴트 모델</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --panel: #ffffff;
      --soft: #f8fafc;
      --blue: #2563eb;
      --red: #dc2626;
      --green: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #fff;
    }
    .shell {
      width: 100%;
      padding: 4px 0 18px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }
    .control {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--soft);
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 650;
      color: #334155;
      margin-bottom: 6px;
    }
    input[type="range"] { width: 100%; }
    input[type="number"] {
      width: 100%;
      height: 30px;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: #fff;
    }
    button {
      height: 34px;
      border: 1px solid #94a3b8;
      border-radius: 7px;
      color: var(--ink);
      background: #fff;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { background: #f1f5f9; }
    button.active {
      color: #ffffff;
      border-color: #1d4ed8;
      background: #2563eb;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      font-size: 13px;
      font-weight: 650;
      color: #334155;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(420px, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel);
    }
    .panel h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    #editor {
      width: 100%;
      height: 560px;
      display: block;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      user-select: none;
      touch-action: none;
    }
    canvas {
      width: 100%;
      height: 430px;
      display: block;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
    }
    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    @media (max-width: 900px) {
      .toolbar { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1 style="margin:0 0 12px;font-size:28px;line-height:1.2;">컨포멀 증착 덴트 모델</h1>
    <p style="margin:0 0 14px;color:#64748b;font-size:14px;">아이패드/PC 브라우저에서 바로 쓰는 웹 버전입니다. 위쪽에서 그래프와 적층 모습을 보고, 아래에서 기본 덴트 구조를 점 편집하세요.</p>
    <div class="toolbar">
      <div class="control">
        <label for="dentWidth">W: 덴트 폭</label>
        <input id="dentWidth" type="number" min="0.1" step="0.1" />
      </div>
      <div class="control">
        <label for="dentDepth">D: 초기 깊이</label>
        <input id="dentDepth" type="number" min="0.1" step="0.1" />
      </div>
      <div class="control">
        <label for="maxDepo">최대 적층량</label>
        <input id="maxDepo" type="number" min="1" step="1" />
      </div>
      <div class="control">
        <label for="selectedDepo">현재 적층량: <span id="selectedDepoLabel"></span></label>
        <input id="selectedDepo" type="range" min="0" max="1" step="1" />
      </div>
      <div class="control">
        <div class="toggle">
          <input id="smoothCurve" type="checkbox" checked />
          <span>부드러운 곡선</span>
        </div>
      </div>
      <button id="resetBtn" type="button">형상 초기화</button>
      <button id="addModeBtn" type="button">점 추가</button>
      <button id="deleteBtn" type="button">점 삭제</button>
    </div>

    <div class="grid">
      <section class="panel">
        <h3>y(x), z(x) 그래프</h3>
        <canvas id="sweepCanvas"></canvas>
      </section>
      <section class="panel">
        <h3>쌓이는 모습 (1 단위 적층)</h3>
        <canvas id="buildCanvas"></canvas>
      </section>
    </div>

    <section class="panel">
      <h3>기본 덴트 구조 점 편집</h3>
      <svg id="editor" viewBox="0 0 760 560" preserveAspectRatio="none"></svg>
      <p class="hint">이 창은 계산 전 기본 덴트 구조만 보여줍니다. 흰 점을 드래그해서 구조를 수정하세요. 점 추가를 켠 뒤 원하는 위치를 터치하면 점이 추가되고, 점 삭제를 켠 뒤 점을 터치하면 삭제됩니다.</p>
    </section>
  </div>

  <script>
    const CONFIG = {"width": 10.0, "depth": 3.0, "maxDeposition": 4.0, "selectedDeposition": 2.0, "layerCount": 12, "points": [{"x": -5.0, "y": 0.0}, {"x": -4.2, "y": 0.0}, {"x": -4.2, "y": -3.0}, {"x": 0.0, "y": -3.0}, {"x": 4.2, "y": -3.0}, {"x": 4.2, "y": 0.0}, {"x": 5.0, "y": 0.0}]};
    let nextId = 1;
    const state = {
      width: CONFIG.width,
      depth: CONFIG.depth,
      maxDepo: CONFIG.maxDeposition,
      selectedDepo: Math.min(CONFIG.selectedDeposition, CONFIG.maxDeposition),
      layerCount: Math.max(3, Math.min(30, Math.round(CONFIG.layerCount))),
      buildFrame: Math.max(0, Math.min(Math.round(CONFIG.layerCount), Math.round(CONFIG.layerCount))),
      smooth: true,
      points: CONFIG.points.map((p, index) => ({
        id: nextId++,
        x: p.x,
        y: p.y,
        locked: index === 0 || index === CONFIG.points.length - 1
      })),
      selectedId: null,
      draggingId: null,
      editMode: "move",
      lastTouchAddAt: 0,
      lastPointerAt: 0
    };
    const defaultPoints = state.points.map(p => ({ ...p, id: p.id }));
    const editor = document.getElementById("editor");
    const sweepCanvas = document.getElementById("sweepCanvas");
    const buildCanvas = document.getElementById("buildCanvas");
    const dentWidthInput = document.getElementById("dentWidth");
    const dentDepthInput = document.getElementById("dentDepth");
    const selectedDepoInput = document.getElementById("selectedDepo");
    const maxDepoInput = document.getElementById("maxDepo");
    const smoothInput = document.getElementById("smoothCurve");
    const addModeBtn = document.getElementById("addModeBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function sortedPoints() {
      return [...state.points].sort((a, b) => a.x - b.x);
    }

    function yRange() {
      return {
        min: -state.depth * 1.18,
        max: Math.max(state.selectedDepo * 1.2, state.depth * 0.2, 0.25)
      };
    }

    function editorScale() {
      const padLeft = 46;
      const padRight = 24;
      const padTop = 22;
      const padBottom = 42;
      const xMin = -state.width / 2;
      const xMax = state.width / 2;
      const yr = yRange();
      return {
        xMin, xMax,
        yMin: yr.min,
        yMax: yr.max,
        padLeft, padRight, padTop, padBottom,
        width: 760,
        height: 560,
        plotW: 760 - padLeft - padRight,
        plotH: 560 - padTop - padBottom
      };
    }

    function xToSvg(x) {
      const s = editorScale();
      return s.padLeft + ((x - s.xMin) / (s.xMax - s.xMin)) * s.plotW;
    }

    function yToSvg(y) {
      const s = editorScale();
      return s.padTop + ((s.yMax - y) / (s.yMax - s.yMin)) * s.plotH;
    }

    function svgToPoint(evt) {
      const rect = editor.getBoundingClientRect();
      const source = evt.touches && evt.touches.length ? evt.touches[0] : evt.changedTouches && evt.changedTouches.length ? evt.changedTouches[0] : evt;
      const sx = (source.clientX - rect.left) * 760 / rect.width;
      const sy = (source.clientY - rect.top) * 560 / rect.height;
      const s = editorScale();
      const x = s.xMin + ((sx - s.padLeft) / s.plotW) * (s.xMax - s.xMin);
      const y = s.yMax - ((sy - s.padTop) / s.plotH) * (s.yMax - s.yMin);
      return { x, y };
    }

    function makeSvg(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, String(value)));
      return el;
    }

    function profileAt(x) {
      const half = state.width / 2;
      if (x <= -half || x >= half) return 0;
      const pts = sortedPoints();
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i];
        const b = pts[i + 1];
        if (x >= a.x && x <= b.x) {
          const span = Math.max(b.x - a.x, 1e-9);
          const t = clamp((x - a.x) / span, 0, 1);
          let y;
          if (state.smooth && pts.length > 3) {
            const p0 = pts[Math.max(0, i - 1)];
            const p1 = a;
            const p2 = b;
            const p3 = pts[Math.min(pts.length - 1, i + 2)];
            const t2 = t * t;
            const t3 = t2 * t;
            y = 0.5 * (
              (2 * p1.y) +
              (-p0.y + p2.y) * t +
              (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
              (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
            );
          } else {
            y = a.y + (b.y - a.y) * t;
          }
          return Math.min(0, Math.max(-state.depth * 1.5, y));
        }
      }
      return 0;
    }

    function fieldMargin() {
      return Math.max(state.width * 0.25, state.maxDepo * 1.05, state.depth * 0.35);
    }

    function evaluateDeposition(deposition, sampleCount = 211, includeField = false) {
      if (sampleCount % 2 === 0) sampleCount += 1;
      const half = state.width / 2;
      const viewMargin = includeField ? fieldMargin() : 0;
      const margin = Math.max(state.width * 0.35 + viewMargin, deposition * 1.4 + viewMargin, state.depth * 0.15);
      const baseX = [];
      const baseY = [];
      for (let i = 0; i < sampleCount; i++) {
        const x = -half - margin + (2 * (half + margin) * i) / (sampleCount - 1);
        baseX.push(x);
        baseY.push(Math.abs(x) <= half ? profileAt(x) : 0);
      }
      const viewX = [];
      const surface = [];
      const viewMin = -half - viewMargin;
      const viewSpan = state.width + viewMargin * 2;
      for (let i = 0; i < sampleCount; i++) {
        const x = viewMin + (viewSpan * i) / (sampleCount - 1);
        viewX.push(x);
        if (deposition <= 0) {
          surface.push(profileAt(x));
          continue;
        }
        let highest = -Infinity;
        for (let j = 0; j < baseX.length; j++) {
          const dx = x - baseX[j];
          if (Math.abs(dx) <= deposition) {
            const candidate = baseY[j] + Math.sqrt(Math.max(deposition * deposition - dx * dx, 0));
            if (candidate > highest) highest = candidate;
          }
        }
        if (!Number.isFinite(highest)) highest = profileAt(x);
        surface.push(Math.min(highest, deposition));
      }
      const dentSurface = surface.filter((_, index) => Math.abs(viewX[index]) <= half + 1e-9);
      const minSurface = Math.min(...(dentSurface.length ? dentSurface : surface));
      const depth = Math.max(0, deposition - minSurface);
      let maxSlope = 0;
      let maxSlopeIndex = -1;
      for (let i = 1; i < surface.length - 1; i++) {
        if (Math.abs(viewX[i]) > half) continue;
        const slope = (surface[i + 1] - surface[i - 1]) / (viewX[i + 1] - viewX[i - 1]);
        if (Math.abs(slope) > maxSlope) {
          maxSlope = Math.abs(slope);
          maxSlopeIndex = i;
        }
      }
      const minIndex = surface.reduce((best, value, index) => {
        if (Math.abs(viewX[index]) > half) return best;
        return value < surface[best] ? index : best;
      }, Math.max(0, surface.findIndex((_, index) => Math.abs(viewX[index]) <= half)));
      return {
        viewX,
        surface,
        depth,
        angle: Math.atan(maxSlope) * 180 / Math.PI,
        angleIndex: maxSlopeIndex,
        depthIndex: minIndex,
        baseX,
        baseY
      };
    }

    function runSweep() {
      const n = 110;
      const xs = [];
      const depths = [];
      const angles = [];
      for (let i = 0; i < n; i++) {
        const x = state.maxDepo * i / (n - 1);
        const result = evaluateDeposition(x, 171);
        xs.push(x);
        depths.push(result.depth);
        angles.push(result.angle);
      }
      return { xs, depths, angles };
    }

    function setupCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.round(rect.width * ratio));
      const h = Math.max(1, Math.round(rect.height * ratio));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return { ctx, w: rect.width, h: rect.height };
    }

    function drawAxes(ctx, w, h, pad) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const x = pad.l + (w - pad.l - pad.r) * i / 5;
        const y = pad.t + (h - pad.t - pad.b) * i / 5;
        ctx.beginPath();
        ctx.moveTo(x, pad.t);
        ctx.lineTo(x, h - pad.b);
        ctx.moveTo(pad.l, y);
        ctx.lineTo(w - pad.r, y);
        ctx.stroke();
      }
      ctx.strokeStyle = "#94a3b8";
      ctx.beginPath();
      ctx.moveTo(pad.l, pad.t);
      ctx.lineTo(pad.l, h - pad.b);
      ctx.lineTo(w - pad.r, h - pad.b);
      ctx.stroke();
    }

    function drawSweepCanvas() {
      const { ctx, w, h } = setupCanvas(sweepCanvas);
      const pad = { l: 54, r: 54, t: 26, b: 42 };
      drawAxes(ctx, w, h, pad);
      const data = runSweep();
      const xMax = Math.max(state.maxDepo, 1e-6);
      const yMax = Math.max(state.depth * 1.05, Math.max(...data.depths) * 1.05, 1);
      const zMax = 90;
      const mapX = x => pad.l + (x / xMax) * (w - pad.l - pad.r);
      const mapY = y => h - pad.b - (y / yMax) * (h - pad.t - pad.b);
      const mapZ = z => h - pad.b - (z / zMax) * (h - pad.t - pad.b);
      ctx.font = "11px system-ui";
      ctx.fillStyle = "#64748b";
      for (let i = 0; i <= 5; i++) {
        const xValue = xMax * i / 5;
        const yValue = yMax * i / 5;
        const zValue = zMax * i / 5;
        const x = mapX(xValue);
        ctx.textAlign = "center";
        ctx.fillText(xValue.toFixed(0), x, h - pad.b + 18);
        ctx.textAlign = "right";
        ctx.fillText(yValue.toFixed(1), pad.l - 8, mapY(yValue) + 4);
        ctx.textAlign = "left";
        ctx.fillText(zValue.toFixed(0), w - pad.r + 6, mapZ(zValue) + 4);
      }
      function line(values, mapper, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        values.forEach((value, i) => {
          const x = mapX(data.xs[i]);
          const y = mapper(value);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }
      line(data.depths, mapY, "#2563eb");
      line(data.angles, mapZ, "#dc2626");
      const selectedX = mapX(state.selectedDepo);
      ctx.strokeStyle = "#334155";
      ctx.setLineDash([6, 5]);
      ctx.beginPath();
      ctx.moveTo(selectedX, pad.t);
      ctx.lineTo(selectedX, h - pad.b);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#0f172a";
      ctx.font = "12px system-ui";
      ctx.fillText("x 증착량", w / 2 - 28, h - 12);
      ctx.fillStyle = "#2563eb";
      ctx.fillText("y 깊이", 10, pad.t + 12);
      ctx.fillStyle = "#dc2626";
      ctx.fillText("z 각도", w - pad.r + 8, pad.t + 12);
    }

    function drawBuildCanvas() {
      const { ctx, w, h } = setupCanvas(buildCanvas);
      const pad = { l: 58, r: 22, t: 30, b: 44 };
      drawAxes(ctx, w, h, pad);
      const activeDepo = Math.round(state.selectedDepo);
      const yMin = -state.depth * 1.12;
      const yMax = Math.max(activeDepo * 1.18, state.depth * 0.24, 0.25);
      const half = state.width / 2;
      const xMin = -half;
      const xSpan = state.width;
      const mapX = x => pad.l + ((x - xMin) / xSpan) * (w - pad.l - pad.r);
      const mapY = y => h - pad.b - ((y - yMin) / (yMax - yMin)) * (h - pad.t - pad.b);
      ctx.font = "11px system-ui";
      ctx.fillStyle = "#64748b";
      for (let i = 0; i <= 5; i++) {
        const xValue = xMin + xSpan * i / 5;
        const yValue = yMin + (yMax - yMin) * i / 5;
        ctx.textAlign = "center";
        ctx.fillText(xValue.toFixed(1), mapX(xValue), h - pad.b + 18);
        ctx.textAlign = "right";
        ctx.fillText(yValue.toFixed(1), pad.l - 8, mapY(yValue) + 4);
      }
      const layers = Math.max(0, activeDepo);
      const surfaces = [];
      for (let dep = 0; dep <= layers; dep++) {
        surfaces.push(evaluateDeposition(dep, 231, true));
      }
      ctx.save();
      ctx.beginPath();
      ctx.rect(pad.l, pad.t, w - pad.l - pad.r, h - pad.t - pad.b);
      ctx.clip();
      for (let i = 1; i < surfaces.length; i++) {
        const prev = surfaces[i - 1];
        const cur = surfaces[i];
        const alpha = 0.12 + 0.36 * i / surfaces.length;
        const fills = [
          `rgba(20, 184, 166, ${alpha})`,
          `rgba(16, 185, 129, ${alpha})`,
          `rgba(132, 204, 22, ${alpha})`
        ];
        const lines = ["rgba(15, 118, 110, 0.75)", "rgba(4, 120, 87, 0.75)", "rgba(77, 124, 15, 0.75)"];
        ctx.fillStyle = fills[i % fills.length];
        ctx.beginPath();
        cur.viewX.forEach((x, idx) => {
          const px = mapX(x);
          const py = mapY(cur.surface[idx]);
          if (idx === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        for (let idx = prev.viewX.length - 1; idx >= 0; idx--) {
          ctx.lineTo(mapX(prev.viewX[idx]), mapY(prev.surface[idx]));
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = lines[i % lines.length];
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        cur.viewX.forEach((x, idx) => {
          const px = mapX(x);
          const py = mapY(cur.surface[idx]);
          if (idx === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
      }
      const base = surfaces[0];
      ctx.strokeStyle = "#475569";
      ctx.setLineDash([6, 5]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      base.viewX.forEach((x, i) => {
        const px = mapX(x);
        const py = mapY(base.surface[i]);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();
      ctx.setLineDash([]);
      const last = surfaces[surfaces.length - 1];
      ctx.strokeStyle = "#047857";
      ctx.lineWidth = 3;
      ctx.beginPath();
      last.viewX.forEach((x, i) => {
        const px = mapX(x);
        const py = mapY(last.surface[i]);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();
      ctx.restore();
      if (last.angleIndex >= 0) {
        const angleX = mapX(last.viewX[last.angleIndex]);
        const angleY = mapY(last.surface[last.angleIndex]);
        ctx.fillStyle = "#dc2626";
        ctx.strokeStyle = "#dc2626";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(angleX, angleY, 5, 0, Math.PI * 2);
        ctx.fill();
        const labelX = Math.min(w - pad.r - 96, Math.max(pad.l + 8, angleX + 12));
        const labelY = Math.max(pad.t + 20, angleY - 30);
        ctx.beginPath();
        ctx.moveTo(angleX + 5, angleY - 4);
        ctx.lineTo(labelX, labelY + 4);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.fillRect(labelX - 4, labelY - 14, 96, 22);
        ctx.strokeStyle = "#fecaca";
        ctx.strokeRect(labelX - 4, labelY - 14, 96, 22);
        ctx.fillStyle = "#991b1b";
        ctx.font = "12px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(`최대각 ${last.angle.toFixed(1)}도`, labelX, labelY + 1);
      }
      ctx.strokeStyle = "#111827";
      ctx.lineWidth = 2;
      const flatY = mapY(activeDepo);
      ctx.beginPath();
      ctx.moveTo(pad.l, flatY);
      ctx.lineTo(w - pad.r, flatY);
      ctx.stroke();
      ctx.fillStyle = "#0f172a";
      ctx.font = "12px system-ui";
      ctx.fillText(`현재 적층량 x=${activeDepo.toFixed(0)}`, pad.l + 8, Math.max(pad.t + 14, flatY - 8));
      if (last.depthIndex >= 0) {
        const depthX = mapX(last.viewX[last.depthIndex]);
        const depthY = mapY(last.surface[last.depthIndex]);
        ctx.strokeStyle = "#2563eb";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(depthX, flatY);
        ctx.lineTo(depthX, depthY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#2563eb";
        ctx.beginPath();
        ctx.arc(depthX, depthY, 4, 0, Math.PI * 2);
        ctx.fill();
        const depthLabelX = Math.min(w - pad.r - 112, Math.max(pad.l + 8, depthX + 12));
        const depthLabelY = Math.min(h - pad.b - 20, Math.max(pad.t + 28, (flatY + depthY) / 2));
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.fillRect(depthLabelX - 4, depthLabelY - 15, 112, 23);
        ctx.strokeStyle = "#bfdbfe";
        ctx.strokeRect(depthLabelX - 4, depthLabelY - 15, 112, 23);
        ctx.fillStyle = "#1d4ed8";
        ctx.font = "12px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(`현재 깊이 ${last.depth.toFixed(2)}`, depthLabelX, depthLabelY + 2);
      }
      ctx.fillStyle = "#64748b";
      ctx.fillText("필드", pad.l + 8, h - pad.b - 8);
      ctx.fillText("덴트", mapX(0) - 12, h - pad.b - 8);
      ctx.fillText("필드", w - pad.r - 36, h - pad.b - 8);
    }

    function drawEditor() {
      editor.innerHTML = "";
      const s = editorScale();
      const plot = makeSvg("rect", {
        x: s.padLeft, y: s.padTop, width: s.plotW, height: s.plotH,
        fill: "#ffffff", stroke: "#e2e8f0", "stroke-width": 1
      });
      editor.appendChild(plot);
      for (let i = 0; i <= 6; i++) {
        const x = s.padLeft + s.plotW * i / 6;
        const y = s.padTop + s.plotH * i / 6;
        editor.appendChild(makeSvg("line", { x1: x, y1: s.padTop, x2: x, y2: s.padTop + s.plotH, stroke: "#eef2f7", "stroke-width": 1 }));
        editor.appendChild(makeSvg("line", { x1: s.padLeft, y1: y, x2: s.padLeft + s.plotW, y2: y, stroke: "#eef2f7", "stroke-width": 1 }));
        const xValue = s.xMin + (s.xMax - s.xMin) * i / 6;
        const yValue = s.yMax - (s.yMax - s.yMin) * i / 6;
        const xLabel = makeSvg("text", {
          x,
          y: s.padTop + s.plotH + 22,
          fill: "#64748b",
          "font-size": 11,
          "text-anchor": "middle"
        });
        xLabel.textContent = xValue.toFixed(1);
        editor.appendChild(xLabel);
        const yLabel = makeSvg("text", {
          x: s.padLeft - 8,
          y: y + 4,
          fill: "#64748b",
          "font-size": 11,
          "text-anchor": "end"
        });
        yLabel.textContent = yValue.toFixed(1);
        editor.appendChild(yLabel);
      }
      const samples = [];
      for (let i = 0; i <= 180; i++) {
        const x = -state.width / 2 + state.width * i / 180;
        samples.push([xToSvg(x), yToSvg(profileAt(x))]);
      }
      const areaPath = [
        `M ${xToSvg(-state.width / 2)} ${yToSvg(0)}`,
        ...samples.map(([x, y]) => `L ${x} ${y}`),
        `L ${xToSvg(state.width / 2)} ${yToSvg(0)}`,
        "Z"
      ].join(" ");
      editor.appendChild(makeSvg("path", { d: areaPath, fill: "rgba(37, 99, 235, 0.08)", stroke: "none" }));
      const linePath = samples.map(([x, y], i) => `${i === 0 ? "M" : "L"} ${x} ${y}`).join(" ");
      editor.appendChild(makeSvg("path", { d: linePath, fill: "none", stroke: "#2563eb", "stroke-width": 3 }));
      const topLine = makeSvg("line", {
        x1: xToSvg(-state.width / 2), y1: yToSvg(0),
        x2: xToSvg(state.width / 2), y2: yToSvg(0),
        stroke: "#111827", "stroke-width": 1.5
      });
      editor.appendChild(topLine);
      sortedPoints().forEach((point, index) => {
        const r = point.locked ? 6 : 7;
        const selected = point.id === state.selectedId;
        const c = makeSvg("circle", {
          cx: xToSvg(point.x),
          cy: yToSvg(point.y),
          r,
          fill: selected ? "#facc15" : "#ffffff",
          stroke: point.locked ? "#475569" : "#0f172a",
          "stroke-width": selected ? 3 : 2,
          cursor: point.locked ? "default" : "grab",
          "data-id": point.id
        });
        const startPointAction = evt => {
          evt.preventDefault();
          state.selectedId = point.id;
          if (state.editMode === "delete") {
            if (!point.locked) deleteSelectedPoint();
            else updateAll();
            return;
          }
          if (!point.locked) state.draggingId = point.id;
          updateAll();
        };
        c.addEventListener("mousedown", startPointAction);
        c.addEventListener("touchstart", startPointAction, { passive: false });
        c.addEventListener("pointerdown", evt => {
          state.lastPointerAt = Date.now();
          startPointAction(evt);
          try { c.setPointerCapture(evt.pointerId); } catch (_) {}
        });
        editor.appendChild(c);
        const label = makeSvg("text", {
          x: xToSvg(point.x) + 9,
          y: yToSvg(point.y) - 9,
          fill: "#64748b",
          "font-size": 11
        });
        label.textContent = index + 1;
        editor.appendChild(label);
      });
      const axisText = makeSvg("text", { x: s.padLeft, y: 552, fill: "#64748b", "font-size": 12 });
      axisText.textContent = `W=${state.width.toFixed(3)}, D=${state.depth.toFixed(3)}`;
      editor.appendChild(axisText);
      const xAxisText = makeSvg("text", {
        x: s.padLeft + s.plotW / 2,
        y: 552,
        fill: "#334155",
        "font-size": 12,
        "text-anchor": "middle"
      });
      xAxisText.textContent = "x 위치";
      editor.appendChild(xAxisText);
      const yAxisText = makeSvg("text", {
        x: 15,
        y: s.padTop + s.plotH / 2,
        fill: "#334155",
        "font-size": 12,
        "text-anchor": "middle",
        transform: `rotate(-90 15 ${s.padTop + s.plotH / 2})`
      });
      yAxisText.textContent = "y 높이";
      editor.appendChild(yAxisText);
    }

    function selectedPointText() {
      const point = state.points.find(p => p.id === state.selectedId);
      if (!point) return "-";
      return `${point.x.toFixed(2)}, ${point.y.toFixed(2)}`;
    }

    function syncControls() {
      dentWidthInput.value = String(state.width);
      dentDepthInput.value = String(state.depth);
      state.maxDepo = Math.max(1, Math.round(state.maxDepo));
      state.selectedDepo = Math.max(0, Math.min(Math.round(state.selectedDepo), state.maxDepo));
      maxDepoInput.value = String(state.maxDepo);
      selectedDepoInput.max = String(state.maxDepo);
      selectedDepoInput.step = "1";
      selectedDepoInput.value = String(state.selectedDepo);
      document.getElementById("selectedDepoLabel").textContent = state.selectedDepo.toFixed(0);
      smoothInput.checked = state.smooth;
      addModeBtn.classList.toggle("active", state.editMode === "add");
      deleteBtn.classList.toggle("active", state.editMode === "delete");
    }

    function updateAll() {
      syncControls();
      drawSweepCanvas();
      drawBuildCanvas();
      drawEditor();
    }

    function addPointFromEvent(evt) {
      const pt = svgToPoint(evt);
      const half = state.width / 2;
      const x = clamp(pt.x, -half + state.width * 0.02, half - state.width * 0.02);
      const y = clamp(pt.y, -state.depth * 1.15, 0);
      const newPoint = { id: nextId++, x, y, locked: false };
      state.points.push(newPoint);
      state.selectedId = newPoint.id;
      updateAll();
    }

    function handleEditorAdd(evt) {
      if (evt.target.tagName.toLowerCase() === "circle") return;
      if (state.editMode !== "add" && evt.type !== "dblclick") return;
      if (evt.type === "click" && Date.now() - state.lastTouchAddAt < 500) return;
      if (evt.type === "click" && Date.now() - state.lastPointerAt < 500) return;
      evt.preventDefault();
      if (evt.type === "touchend") state.lastTouchAddAt = Date.now();
      addPointFromEvent(evt);
    }

    editor.addEventListener("dblclick", handleEditorAdd);
    editor.addEventListener("click", handleEditorAdd);
    editor.addEventListener("touchend", handleEditorAdd, { passive: false });
    editor.addEventListener("pointerdown", evt => {
      if (evt.target.tagName.toLowerCase() === "circle") return;
      if (state.editMode !== "add") return;
      state.lastPointerAt = Date.now();
      evt.preventDefault();
      addPointFromEvent(evt);
    });

    function dragMove(evt) {
      if (!state.draggingId) return;
      evt.preventDefault();
      const point = state.points.find(p => p.id === state.draggingId);
      if (!point || point.locked) return;
      const coord = svgToPoint(evt);
      const half = state.width / 2;
      const edgeGap = state.width * 0.01;
      point.x = clamp(coord.x, -half + edgeGap, half - edgeGap);
      point.y = clamp(coord.y, -state.depth * 1.15, 0);
      updateAll();
    }

    window.addEventListener("mousemove", dragMove);
    window.addEventListener("touchmove", dragMove, { passive: false });
    window.addEventListener("pointermove", dragMove, { passive: false });

    window.addEventListener("mouseup", () => {
      state.draggingId = null;
    });
    window.addEventListener("touchend", () => {
      state.draggingId = null;
    });
    window.addEventListener("pointerup", () => {
      state.draggingId = null;
    });
    window.addEventListener("pointercancel", () => {
      state.draggingId = null;
    });

    window.addEventListener("keydown", evt => {
      if (evt.key === "Delete" || evt.key === "Backspace") {
        deleteSelectedPoint();
      }
    });

    function deleteSelectedPoint() {
      const point = state.points.find(p => p.id === state.selectedId);
      if (!point || point.locked) return;
      state.points = state.points.filter(p => p.id !== state.selectedId);
      state.selectedId = null;
      updateAll();
    }

    deleteBtn.addEventListener("click", () => {
      if (state.selectedId && state.editMode !== "delete") {
        deleteSelectedPoint();
      } else {
        state.editMode = state.editMode === "delete" ? "move" : "delete";
        updateAll();
      }
    });
    addModeBtn.addEventListener("click", () => {
      state.editMode = state.editMode === "add" ? "move" : "add";
      updateAll();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      state.points = defaultPoints.map(p => ({ ...p, id: nextId++ }));
      state.selectedId = null;
      updateAll();
    });
    dentWidthInput.addEventListener("change", evt => {
      const nextWidth = Math.max(0.1, Number(evt.target.value) || state.width);
      const scale = nextWidth / state.width;
      state.width = nextWidth;
      state.points.forEach(point => {
        point.x *= scale;
      });
      const pts = sortedPoints();
      pts[0].x = -state.width / 2;
      pts[pts.length - 1].x = state.width / 2;
      state.maxDepo = Math.max(state.maxDepo, state.width * 0.1);
      state.selectedDepo = Math.min(state.selectedDepo, state.maxDepo);
      updateAll();
    });
    dentDepthInput.addEventListener("change", evt => {
      const nextDepth = Math.max(0.1, Number(evt.target.value) || state.depth);
      const scale = nextDepth / state.depth;
      state.depth = nextDepth;
      state.points.forEach(point => {
        point.y *= scale;
      });
      state.points.forEach(point => {
        point.y = clamp(point.y, -state.depth * 1.15, 0);
      });
      state.maxDepo = Math.max(state.maxDepo, state.depth * 0.75);
      state.selectedDepo = Math.min(state.selectedDepo, state.maxDepo);
      updateAll();
    });
    maxDepoInput.addEventListener("change", evt => {
      state.maxDepo = Math.max(1, Math.round(Number(evt.target.value) || state.maxDepo));
      state.selectedDepo = Math.min(state.selectedDepo, state.maxDepo);
      updateAll();
    });
    selectedDepoInput.addEventListener("input", evt => {
      state.selectedDepo = Math.round(Number(evt.target.value));
      updateAll();
    });
    smoothInput.addEventListener("change", evt => {
      state.smooth = evt.target.checked;
      updateAll();
    });
    window.addEventListener("resize", updateAll);
    updateAll();
  </script>
</body>
</html>
